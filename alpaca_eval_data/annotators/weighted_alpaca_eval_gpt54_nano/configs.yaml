weighted_alpaca_eval_gpt54_nano:
  prompt_template: "weighted_alpaca_eval_gpt54_nano/alpaca_eval_clf.txt"
  fn_completions: "openai_completions"
  completions_kwargs:
    model_name: "gpt-5.4-nano"
    max_tokens: 1
    temperature: 1
    logprobs: true
    top_logprobs: 5
  fn_completion_parser: "logprob_parser"
  completion_parser_kwargs:
    numerator_token: "m"
    denominator_tokens: ["m", "M"]
    is_binarize: false
  completion_key: "completions_all"
  batch_size: 1
