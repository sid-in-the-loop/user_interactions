weighted_alpaca_eval_qwen3_4b:
  prompt_template: "weighted_alpaca_eval_qwen3_4b/alpaca_eval_clf_nothink.txt"
  fn_completions: "openai_completions"
  completions_kwargs:
    model_name: "Qwen/Qwen3-4B"
    max_tokens: 1
    temperature: 1
    logprobs: true
    top_logprobs: 5
    extra_body:
      chat_template_kwargs:
        enable_thinking: false
  fn_completion_parser: "logprob_parser"
  completion_parser_kwargs:
    numerator_token: "m"
    denominator_tokens: ["m", "M"]
    is_binarize: false
  completion_key: "completions_all"
  batch_size: 1
